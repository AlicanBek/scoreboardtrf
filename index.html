<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#050505">
  <title>Football Scoreboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- SCOREBOARD (LED Canvas) -->
  <div id="scoreboard">
    <div class="board-frame">
      <canvas id="led-canvas"></canvas>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div id="controls">
    <h2>Control Panel</h2>

    <div class="control-grid">

      <!-- Team Names -->
      <div class="control-section">
        <h3>Teams</h3>
        <div class="control-row">
          <label>Home</label>
          <input type="text" id="ctrl-home-name" value="HOME" maxlength="6">
        </div>
        <div class="control-row">
          <label>Away</label>
          <input type="text" id="ctrl-away-name" value="AWAY" maxlength="6">
        </div>
        <div class="button-group">
          <button onclick="updateTeamNames()">Update Names</button>
        </div>
      </div>

      <!-- Score — side by side -->
      <div class="control-grid-row">
        <div class="control-section">
          <h3>Home Score</h3>
          <div class="button-group">
            <button onclick="changeScore('home', 6)">TD +6</button>
            <button onclick="changeScore('home', 3)">FG +3</button>
            <button onclick="changeScore('home', 1)">XP +1</button>
            <button onclick="changeScore('home', 2)">2PT</button>
            <button onclick="changeScore('home', 2)" class="safety">SAF +2</button>
            <button onclick="changeScore('home', -1)" class="minus">-1</button>
          </div>
        </div>
        <div class="control-section">
          <h3>Away Score</h3>
          <div class="button-group">
            <button onclick="changeScore('away', 6)">TD +6</button>
            <button onclick="changeScore('away', 3)">FG +3</button>
            <button onclick="changeScore('away', 1)">XP +1</button>
            <button onclick="changeScore('away', 2)">2PT</button>
            <button onclick="changeScore('away', 2)" class="safety">SAF +2</button>
            <button onclick="changeScore('away', -1)" class="minus">-1</button>
          </div>
        </div>
      </div>

      <!-- Game Clock -->
      <div class="control-section">
        <h3>Game Clock</h3>
        <div class="button-group">
          <button onclick="startGameClock()" class="go">Start</button>
          <button onclick="stopGameClock()" class="stop">Stop</button>
          <button onclick="resetGameClock()">Reset 15:00</button>
        </div>
        <div class="control-row" style="margin-top:10px">
          <label>Set</label>
          <input type="text" id="ctrl-clock" value="15:00" maxlength="5" placeholder="MM:SS" inputmode="numeric">
          <button onclick="setGameClock()" style="flex:none">Set</button>
        </div>
      </div>

      <!-- Quarter + Down/Distance side by side -->
      <div class="control-grid-row">
        <div class="control-section">
          <h3>Quarter</h3>
          <div class="button-group">
            <button onclick="setQuarter(1)">1</button>
            <button onclick="setQuarter(2)">2</button>
            <button onclick="setQuarter(3)">3</button>
            <button onclick="setQuarter(4)">4</button>
            <button onclick="setQuarter('OT')">OT</button>
          </div>
        </div>
        <div class="control-section">
          <h3>Down & Distance</h3>
          <div class="control-row">
            <label>Dn</label>
            <select id="ctrl-down">
              <option value="1">1st</option>
              <option value="2">2nd</option>
              <option value="3">3rd</option>
              <option value="4">4th</option>
            </select>
          </div>
          <div class="control-row">
            <label>Yds</label>
            <input type="number" id="ctrl-distance" value="10" min="1" max="99" inputmode="numeric">
          </div>
          <div class="button-group">
            <button onclick="updateDownDistance()">Set</button>
            <button onclick="setGoal()">Goal</button>
          </div>
        </div>
      </div>

      <!-- Play Clock + Possession side by side -->
      <div class="control-grid-row">
        <div class="control-section">
          <h3>Play Clock</h3>
          <div class="button-group">
            <button onclick="startPlayClock(40)">40s</button>
            <button onclick="startPlayClock(25)">25s</button>
            <button onclick="stopPlayClock()" class="stop">Stop</button>
            <button onclick="resetPlayClock()">Reset</button>
          </div>
        </div>
        <div class="control-section">
          <h3>Possession</h3>
          <div class="button-group">
            <button onclick="setPossession('home')">Home</button>
            <button onclick="setPossession('away')">Away</button>
            <button onclick="setPossession(null)">Clear</button>
          </div>
        </div>
      </div>

      <!-- Reset -->
      <div class="control-section">
        <h3>Game</h3>
        <div class="button-group">
          <button onclick="resetGame()" class="stop">Reset All</button>
        </div>
      </div>

    </div>
  </div>

  <script src="led-font.js"></script>
  <script src="app.js"></script>
</body>
</html>
